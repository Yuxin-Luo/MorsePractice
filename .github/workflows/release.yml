name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  # 1. 共享：构建 web 资源（上传给下游 2 个 job）
  build-assets:
    name: Build web assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build web assets
        run: bash release/scripts/build-assets.sh
      - uses: actions/upload-artifact@v4
        with:
          name: web-assets
          path: release/dist/web/
          retention-days: 1

  # 2. Linux .deb
  build-linux:
    name: Build Linux .deb
    needs: build-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: release/dist/web
      - name: Build .deb
        run: bash release/scripts/build-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: morse-practice-linux-deb
          path: release/dist/*.deb

  # 3. Windows .exe
  build-windows:
    name: Build Windows .exe
    needs: build-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: release/dist/web
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false  # 项目无外部 Go 依赖，无需缓存
      - name: Build .exe
        run: bash release/scripts/build-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: morse-practice-windows-exe
          path: release/dist/*.exe

  # 4. 收集产物 + 创建 Release
  # 注：Android .apk 不在 CI 编（见 release/dev_doc/2026-06-25-local-android-build-guide.md）
  # 推 tag 触发本 workflow → release job 跑出 .deb + .exe → 用户本地编 APK 后用
  #     gh release upload vX.Y.Z release/dist/*.apk --clobber 追加到 release
  # fail_on_unmatched_files: false 让 .apk 缺失时不报错
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/dist/
          pattern: morse-practice-*
          merge-multiple: true
      - name: Generate changelog
        id: cliff
        # 注:仓库是 orhun/git-cliff-action (orhun 的 GitHub 用户名没有 p)
        # npm 上 orhunp 是别名,这里用 GitHub 路径
        uses: orhun/git-cliff-action@v3
        with:
          config: release/cliff.toml
          args: --verbose
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.cliff.outputs.content }}
          files: |
            release/dist/*.deb
            release/dist/*.exe
            release/dist/*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          fail_on_unmatched_files: false  # APK 由用户本地编后手动 upload
