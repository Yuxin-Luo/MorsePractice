name: Release

# ============================================================================
# ⚠️  本 workflow 已禁用 (2026-06-25)
# 原因:用户决定全手动发布 —— 本地编 3 平台 → gh release create → 完成
# 恢复方法:取消下方 trigger 的注释,删掉此注释块即可
# ============================================================================
#
# on:
#   push:
#     tags: ['v*.*.*']

on:
  workflow_dispatch:  # 保留手动触发入口,便于将来用 Actions 跑单 job

permissions:
  contents: write

jobs:
  # 1. 共享：构建 web 资源（上传给下游 2 个 job）
  build-assets:
    name: Build web assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build web assets
        run: bash release/scripts/build-assets.sh
      - uses: actions/upload-artifact@v4
        with:
          name: web-assets
          path: release/dist/web/
          retention-days: 1

  # 2. Linux .deb
  build-linux:
    name: Build Linux .deb
    needs: build-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: release/dist/web
      - name: Build .deb
        run: bash release/scripts/build-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: morse-practice-linux-deb
          path: release/dist/*.deb

  # 3. Windows .exe
  build-windows:
    name: Build Windows .exe
    needs: build-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: release/dist/web
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false  # 项目无外部 Go 依赖，无需缓存
      - name: Build .exe
        run: bash release/scripts/build-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: morse-practice-windows-exe
          path: release/dist/*.exe

  # ⚠️ release job 已删除 —— 全手动模式:
  #   本地 3 平台编译完 → gh release create vX.Y.Z release/dist/*.{deb,exe,apk}
  #   详见 release/dev_doc/2026-06-25-action-checklist.md (新版,纯手动流程)

